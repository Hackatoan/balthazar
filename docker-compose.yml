services:
  bot:
    image: ghcr.io/hackatoan/balthazar:latest
    container_name: balthazar-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "3020:3000"
    volumes:
      - /opt/terryvis/clips:/app/public/clips
      - balthazar-data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  balthazar-data:

networks:
  default:
    name: balthazar_default
