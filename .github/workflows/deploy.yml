name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/hackatoan/balthazar:latest

      - name: Build and push asr
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.whisper
          push: true
          tags: ghcr.io/hackatoan/balthazar-asr:latest

      - name: Build and push piper
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.piper
          push: true
          tags: ghcr.io/hackatoan/balthazar-piper:latest
